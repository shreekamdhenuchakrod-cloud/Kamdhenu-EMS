[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
    [headers.values]
      X-Frame-Options = "DENY"
      X-XSS-Protection = "1; mode=block"
      X-Content-Type-Options = "nosniff"
      Referrer-Policy = "no-referrer"
      Content-Security-Policy = "default-src 'self' https://*.googleapis.com https://*.firebaseapp.com https://fonts.googleapis.com https://fonts.gstatic.com https://apis.google.com https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.googleapis.com https://*.firebaseapp.com https://apis.google.com https://accounts.google.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.googleapis.com https://*.firebaseapp.com wss://*.firebaseio.com https://accounts.google.com https://apis.google.com https://fonts.gstatic.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; frame-src 'self' https://*.firebaseapp.com https://accounts.google.com https://apis.google.com;"

[[headers]]
  for = "/service-worker.js"
    [headers.values]
      Cache-Control = "no-cache, no-store, must-revalidate"
