<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="192" height="192">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="50%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    
    <!-- Cow Silhouette Gradient -->
    <linearGradient id="cowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <!-- Ring Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Rounded App Background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Outer Glow Ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#ffffff" stroke-width="4" stroke-opacity="0.15" />

  <!-- Decorative Inner Sync Ring -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="url(#cowGrad)" stroke-width="6" stroke-dasharray="16 12" stroke-opacity="0.8" />

  <!-- Stylized Cow Emblem (Kamdhenu representation) & Management Check -->
  <g transform="translate(128, 128) scale(0.5)">
    <!-- Cow Face Outline -->
    <!-- Ears -->
    <path d="M 60,160 C 10,140 -20,190 20,240 C 40,220 50,190 60,160 Z" fill="#ffffff" opacity="0.9" />
    <path d="M 452,160 C 502,140 532,190 492,240 C 472,220 462,190 452,160 Z" fill="#ffffff" opacity="0.9" />

    <!-- Horns -->
    <path d="M 120,130 C 90,60 110,10 160,20 C 150,50 140,90 140,120 Z" fill="url(#cowGrad)" filter="url(#glow)" />
    <path d="M 392,130 C 422,60 402,10 352,20 C 362,50 372,90 372,120 Z" fill="url(#cowGrad)" filter="url(#glow)" />

    <!-- Main Head -->
    <path d="M 130,130 C 130,130 110,240 130,310 C 150,380 200,430 256,430 C 312,430 362,380 382,310 C 402,240 382,130 382,130 L 130,130 Z" fill="#ffffff" />
    
    <!-- Snout / Nose -->
    <path d="M 170,300 C 170,300 160,420 256,420 C 352,420 342,300 342,300 L 170,300 Z" fill="#f1f5f9" />
    <!-- Nostrils -->
    <circle cx="216" cy="360" r="14" fill="#cbd5e1" />
    <circle cx="296" cy="360" r="14" fill="#cbd5e1" />
    
    <!-- Forehead Star Mark -->
    <path d="M 256,150 L 271,180 L 306,185 L 281,210 L 286,245 L 256,228 L 226,245 L 231,210 L 206,185 L 241,180 Z" fill="url(#cowGrad)" />

    <!-- Eyes -->
    <ellipse cx="196" cy="220" rx="16" ry="24" fill="#1e293b" />
    <ellipse cx="316" cy="220" rx="16" ry="24" fill="#1e293b" />
    <!-- Eye Highlights -->
    <circle cx="190" cy="210" r="6" fill="#ffffff" />
    <circle cx="310" cy="210" r="6" fill="#ffffff" />
  </g>

  <!-- Clipboard / Management Overlay Checkmark in bottom right -->
  <g transform="translate(310, 310)">
    <!-- Badge Background -->
    <circle cx="65" cy="65" r="55" fill="#10b981" stroke="#ffffff" stroke-width="8" />
    <!-- Checkmark -->
    <path d="M 35,65 L 55,85 L 95,45" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
